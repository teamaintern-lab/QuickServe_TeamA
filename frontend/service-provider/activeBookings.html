<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Serve - Active Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Quick Serve</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="active-bookings.html">Active Bookings</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h1 class="mb-4">Active Bookings</h1>
        <div id="bookingsList">
            <!-- Sample bookings (replace with dynamic data from API) -->
            <div class="booking-card">
                <h5>Booking #12345</h5>
                <p><strong>Customer:</strong> John Doe</p>
                <p><strong>Service:</strong> Plumbing</p>
                <p><strong>Date/Time:</strong> 2023-10-15 10:00 AM</p>
                <p><strong>Status:</strong> Pending</p>
                <button class="btn btn-success btn-sm me-2" onclick="acceptBooking(12345)">Accept</button>
                <button class="btn btn-danger btn-sm me-2" onclick="rejectBooking(12345)">Reject</button>
                <button class="btn btn-primary btn-sm" onclick="completeBooking(12345)">Mark Complete</button>
            </div>
            <div class="booking-card">
                <h5>Booking #12346</h5>
                <p><strong>Customer:</strong> Jane Smith</p>
                <p><strong>Service:</strong> Cleaning</p>
                <p><strong>Date/Time:</strong> 2023-10-16 2:00 PM</p>
                <p><strong>Status:</strong> Accepted</p>
                <button class="btn btn-primary btn-sm" onclick="completeBooking(12346)">Mark Complete</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function acceptBooking(id) {
            alert(`Booking ${id} accepted!`);
            // Update status via API
        }
        function rejectBooking(id) {
            alert(`Booking ${id} rejected!`);
            // Update status via API
        }
        function completeBooking(id) {
            alert(`Booking ${id} completed!`);
            // Update status via API
        }
        function logout() {
            alert('Logged out!');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
